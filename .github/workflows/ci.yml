name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23', '1.25.1']

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Get dependencies
      run: go mod download

    - name: Run tests with race detector
      run: |
        set -euo pipefail

        # Get list of packages
        PKGS="$(go list ./...)"

        # Create empty coverage file with header
        echo "mode: atomic" > coverage.out

        # Test each package individually and merge coverage
        echo "${PKGS}" | while read -r pkg; do
          if [ -n "$pkg" ]; then
            echo "Testing ${pkg}..."
            if go list -f '{{.TestGoFiles}}' "$pkg" | grep -q '\[.*\.go\]'; then
              go test -v -race -coverprofile=tmp.out -covermode=atomic "$pkg"
              # Merge coverage data (skip mode line)
              if [ -f tmp.out ]; then
                grep -h -v "^mode:" tmp.out >> coverage.out 2>/dev/null || true
                rm tmp.out
              fi
            else
              echo "  No test files, skipping..."
            fi
          fi
        done

        # Display coverage report
        go tool cover -func=coverage.out

    - name: Generate coverage HTML report
      run: go tool cover -html=coverage.out -o coverage.html
      if: matrix.go-version == '1.25.1'

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage-${{ matrix.go-version }}
        path: coverage.html
      if: matrix.go-version == '1.25.1'

    - name: Run benchmarks
      run: go test -bench=. -benchmem -benchtime=10s ./pkg/cms

    - name: Run fuzz tests (short)
      run: |
        go test -fuzz=FuzzVerify -fuzztime=10s ./pkg/cms
        go test -fuzz=FuzzParseASN1Length -fuzztime=10s ./pkg/cms

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: '1.25.1'

    - name: Run gosec
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
        gosec -exclude=G115 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: '1.25.1'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
      with:
        args: --timeout=5m
